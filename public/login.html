<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Login – Network Diagnostics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .login-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 30px;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  .login-panel input {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border-light);
    color: white;
    padding: 10px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .login-panel button {
    margin-top: 10px;
    padding: 10px;
    width: 100%;
    justify-content: center;
  }
</style>
</head>
<body>

<div class="login-panel">
  <div class="panel-header" style="justify-content: center; padding-bottom: 20px;">
    <span class="panel-title">ADMIN LOGIN</span>
  </div>
  <input type="text" id="user" placeholder="Username" />
  <input type="password" id="pass" placeholder="Password" />
  <button class="run-btn" onclick="login()">Login</button>
  <div id="error-msg" style="color: var(--red); font-size: 13px; text-align: center; display: none;">Invalid login</div>
</div>

<script>
async function login() {
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });

  if (res.ok) {
    window.location.href = "/admin.html";
  } else {
    const err = document.getElementById("error-msg");
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
